name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      KILIX_COMMIT: 55fc6053ec0918c6ff5e828937b418ea8d5995fa
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3-pil python3-xlib
      - name: Run tests
        env:
          KILIX_HOME: ${{ github.workspace }}/../kilix
        run: |
          git init "$KILIX_HOME"
          git -C "$KILIX_HOME" remote add origin https://github.com/itsmygithubacct/kilix
          git -C "$KILIX_HOME" fetch --depth 1 origin "$KILIX_COMMIT"
          git -C "$KILIX_HOME" checkout --detach FETCH_HEAD
          git -C "$KILIX_HOME" submodule update --init \
            third_party/kilix-content \
            third_party/kilix-state \
            third_party/kilix-state-py \
            third_party/kitty-frame-presenter
          python3 tests/run.py
